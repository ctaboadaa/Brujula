name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Clave "publishable" de Supabase: está diseñada para ser pública (la protección
      # real de los datos es Row Level Security en la base de datos, no ocultar esta clave)
      VITE_SUPABASE_URL: https://ucjuyujfwrapcojropzb.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_nAas93C1IfK6tS01J3Ogog_SnawKNbC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
